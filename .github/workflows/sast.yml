name: Semgrep

on:
  pull_request:
    branches: ["main"]
    # Se recomienda añadir estos tipos para que se reactive si el PR cambia
    types: [opened, synchronize, reopened]

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    # Se añaden permisos necesarios para que Semgrep pueda escribir en el PR
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Crucial: Semgrep necesita el historial para comparar ramas
          fetch-depth: 0

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/nextjs
            p/react
        env:
          # Indica a Semgrep que solo analice los cambios del PR
          SEMGREP_PR_ID: ${{ github.event.number }}
          SEMGREP_FAIL_ON_ERROR: "1"